databases:
  - name: tali-core-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: tali-core-identity-billing
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tali-core-db
          property: connectionString
      - key: WAYFORPAY_SECRET_KEY
        sync: false
